<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clock Store Pro</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- Navbar -->
<div class="flex justify-between items-center bg-black text-white px-6 py-4">
    <h1 class="text-xl font-bold">ClockStore</h1>
    <button onclick="showCart()" class="bg-orange-500 px-3 py-1 rounded">
        Cart 🛒 (<span id="count">0</span>)
    </button>
</div>

<!-- Hero -->
<div class="text-center py-16 bg-gradient-to-r from-black to-gray-700 text-white">
    <h1 class="text-3xl md:text-5xl font-bold">Time Never Stops ⏰</h1>
    <p class="mt-3 text-lg">Buy & Sell Premium Clocks</p>
    <div id="clock" class="text-2xl mt-3"></div>
</div>

<!-- Products -->
<div class="p-6">
    <h2 class="text-2xl font-bold text-center mb-6">Our Clocks</h2>

    <div id="productList" 
    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    </div>
</div>

<!-- Sell Section -->
<div class="bg-white p-6 text-center shadow-md">
    <h2 class="text-xl font-bold mb-3">Sell Your Clock</h2>

    <input id="name" placeholder="Clock Name" class="border p-2 m-2">
    <input id="price" type="number" placeholder="Price" class="border p-2 m-2">
    <input id="img" placeholder="Image URL" class="border p-2 m-2 w-64">

    <br>
    <button onclick="addProduct()" 
    class="bg-green-500 text-white px-4 py-2 mt-3 rounded hover:bg-green-600">
        Add Product
    </button>
</div>

<!-- Cart -->
<div id="cartBox" class="hidden bg-black text-white p-6">
    <h2 class="text-xl font-bold mb-3">Your Cart</h2>
    <div id="cartItems"></div>
</div>

<script>

// Products with GOOD images
let products = JSON.parse(localStorage.getItem("products")) || [
{
    name: "Luxury Wall Clock",
    price: 999,
    img: "https://images.unsplash.com/photo-1508963493744-76fce69379c6"
},
{
    name: "Modern Digital Clock",
    price: 1499,
    img: "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b"
},
{
    name: "Wooden Table Clock",
    price: 799,
    img: "https://images.unsplash.com/photo-1519710164239-da123dc03ef4"
},
{
    name: "Classic Vintage Clock",
    price: 1299,
    img: "https://images.unsplash.com/photo-1524594227088-74c8c1c2d5a4"
}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Render Products
function renderProducts() {
    let html = "";
    products.forEach((p, index) => {
        html += `
        <div class="bg-white rounded-xl shadow-md p-4 
        transform transition duration-300 hover:scale-105 hover:shadow-xl">
            <img src="${p.img}" class="w-full h-48 object-cover rounded">
            <h3 class="font-bold mt-2">${p.name}</h3>
            <p class="text-gray-600">₹${p.price}</p>
            <button onclick="addToCart(${index})"
            class="bg-black text-white px-3 py-1 mt-2 rounded hover:bg-gray-800">
                Add to Cart
            </button>
        </div>`;
    });

    document.getElementById("productList").innerHTML = html;
}

// Add to Cart
function addToCart(index) {
    cart.push(products[index]);
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartCount();
    alert("Added to cart!");
}

// Show Cart
function showCart() {
    let html = "";
    cart.forEach((item, i) => {
        html += `
        <div class="flex justify-between border-b py-2">
            <span>${item.name} - ₹${item.price}</span>
            <button onclick="removeItem(${i})"
            class="bg-red-500 px-2 rounded">Remove</button>
        </div>`;
    });

    document.getElementById("cartItems").innerHTML = html;
    document.getElementById("cartBox").classList.remove("hidden");
}

// Remove Item
function removeItem(i) {
    cart.splice(i, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    showCart();
    updateCartCount();
}

// Add Product
function addProduct() {
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let img = document.getElementById("img").value;

    if(name && price && img){
        products.push({name, price, img});
        localStorage.setItem("products", JSON.stringify(products));
        renderProducts();
        alert("Product Added!");
    }
}

// Cart Count
function updateCartCount() {
    document.getElementById("count").innerText = cart.length;
}

// Live Clock
function updateClock() {
    let now = new Date();
    document.getElementById("clock").innerText = now.toLocaleTimeString();
}

setInterval(updateClock, 1000);

// Init
renderProducts();
updateCartCount();

</script>

</body>
</html>
